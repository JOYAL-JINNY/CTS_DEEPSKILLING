<div class="profile-container">
  <h2>👤 Student Profile</h2>

  <section class="enrolled-section">
    <h3>Enrolled Courses</h3>
    
    <ng-container *ngIf="enrolledCourses$ | async as enrolledCourses">
      <ul *ngIf="enrolledCourses.length > 0; else noEnrolled">
        <li *ngFor="let c of enrolledCourses" class="enrolled-item">
          <strong>{{ c.name }}</strong> — {{ c.code }}
          <span class="status-tag status-{{ c.gradeStatus }}">{{ c.gradeStatus }}</span>
        </li>
      </ul>
    </ng-container>

    <ng-template #noEnrolled>
      <p class="empty-msg">You are not enrolled in any courses yet.</p>
    </ng-template>
  </section>

  <app-course-summary-widget></app-course-summary-widget>

  <app-notification></app-notification>
</div>
