<div class="detail-container">

  <button class="btn-back" (click)="goBack()">← Back to Courses</button>

  <ng-container *ngIf="course; else noCourseTpl">
    <div class="detail-card">
      <h2>{{ course.name }}</h2>
      <div class="detail-row">
        <span class="detail-label">Course ID</span>
        <span class="detail-value">{{ course.id }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Code</span>
        <span class="detail-value">{{ course.code }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Credits</span>
        <span class="detail-value">{{ course.credits }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Grade Status</span>
        <span class="detail-value status-{{ course.gradeStatus }}">{{ course.gradeStatus | titlecase }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Enrolled</span>
        <span class="detail-value">{{ course.enrolled ? 'Yes' : 'No' }}</span>
      </div>
    </div>
  </ng-container>

  <ng-template #noCourseTpl>
    <p class="not-found">Course not found. <a routerLink="/courses">View all courses</a></p>
  </ng-template>

</div>
