<div class="home-container">
  <h1>Welcome to {{ portalName }}</h1>
  <p class="description">
    Manage your course enrollments, track your academic progress, and explore available courses.
  </p>

  <div class="search-section">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Search courses...">
    <p class="search-result">Searching for: {{ searchTerm }}</p>
  </div>

  <div class="action-section">
    <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
    <p class="message" *ngIf="message">{{ message }}</p>
  </div>

  <!-- Task 100: Stats driven by NgRx state and Async pipe -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-label">Courses Available</span>
      <span class="stat-value">{{ coursesCount$ | async }}</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Enrolled</span>
      <span class="stat-value">{{ enrolledCount$ | async }}</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">GPA</span>
      <span class="stat-value">3.8</span>
    </div>
  </div>
</div>
